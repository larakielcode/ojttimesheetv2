<!-- ── reports.view.html ─────────────────────────────────────────── -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/public/assets/css/reports.css" />
  <title>Omega Healthcare – Reports</title>
</head>

<body>

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-spacer"></div>
    <nav class="sidebar-nav">
      <a href="/views/dashboard.view.html" class="nav-item">
        <img src="/public/assets/images/dashboard_icon.png" alt="Dashboard icon">
        Dashboard
      </a>
      <a href="/views/reports.view.html" class="nav-item active">
        <img src="/public/assets/images/reports_icon.png" alt="Reports icon">
        Reports
      </a>
      <a href="/views/interns.view.html" class="nav-item">
        <img src="/public/assets/images/interns_icon.png" alt="Interns icon">
        Interns
      </a>
      <a href="#" class="nav-item">
        <img src="/public/assets/images/logout_icon.png" alt="Log Out icon">
        Log Out
      </a>
    </nav>
  </aside>

  <!-- ── MAIN CONTENT ─────────────────────────────────────────── -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-logo">
        <img src="/public/assets/images/omegalogo.png" alt="Omega Logo">
      </div>
      <div class="topbar-user-section">
        <span class="topbar-user">Currently logged as: Admin</span>
        <img src="/public/assets/images/user icon.png" alt="User avatar">
      </div>
    </header>

    <!-- ── PAGE CONTENT ──────────────────────────────────── -->
    <div class="page-content">

      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="#aaa" stroke-width="1.8" />
            <path d="M13.5 13.5L17 17" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" />
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search by name or ID..."
            oninput="filterCards()" />
        </div>
      </div>

      <div class="content-spacer"></div>

      <div class="table-card">
        <table class="intern-table">
          <thead>
            <tr>
              <th>Intern ID</th>
              <th>Name</th>
              <th>School</th>
              <th>Site</th>
              <th>Hours Progress</th>
            </tr>
          </thead>
          <tbody>
            <tr class="intern-row" data-id="001" data-firstname="Jean Claudette" data-lastname="Pena">
              <td>001</td>
              <td>Jean Claudette Pena</td>
              <td>CTU</td>
              <td><span class="site-badge badge-cebu">Cebu</span></td>
              <td>
                <div class="hours-cell">
                  <div class="hours-bar-track">
                    <div class="hours-bar-fill" style="width: 41%;"></div>
                  </div>
                  <span class="hours-text">300/729 hrs</span>
                </div>
              </td>
            </tr>
            <tr class="intern-row" data-id="002" data-firstname="Vera" data-lastname="Angeli">
              <td>002</td>
              <td>Vera Angeli</td>
              <td>DLSU</td>
              <td><span class="site-badge badge-manila">Manila</span></td>
              <td>
                <div class="hours-cell">
                  <div class="hours-bar-track">
                    <div class="hours-bar-fill" style="width: 34%;"></div>
                  </div>
                  <span class="hours-text">250/729 hrs</span>
                </div>
              </td>
            </tr>
            <tr class="intern-row" data-id="003" data-firstname="Renz Lorenzo" data-lastname="Mercado">
              <td>003</td>
              <td>Renz Lorenzo Mercado</td>
              <td>CIT-U</td>
              <td><span class="site-badge badge-cebu">Cebu</span></td>
              <td>
                <div class="hours-cell">
                  <div class="hours-bar-track">
                    <div class="hours-bar-fill" style="width: 20%;"></div>
                  </div>
                  <span class="hours-text">120/600 hrs</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <p class="no-results" id="noResults" style="display:none;">No interns found.</p>

    </div><!-- /page-content -->
  </div><!-- /main -->

  <script src="/public/assets/js/reports.js"></script>

</body>

</html>
